name: iri

services:
  postgres:
    image: docker.io/pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: continuum
      POSTGRES_USER: continuum
      POSTGRES_PASSWORD: continuum
    ports:
      - "5432:5432"
    volumes:
      - iri_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U continuum -d continuum"]
      interval: 5s
      timeout: 3s
      retries: 20

  neo4j:
    image: docker.io/library/neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/continuum-local
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - iri_neo4j:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  iri_postgres:
  iri_neo4j:
